---
- hosts: guests:extras
  become: yes
  become_user: isucon
  gather_facts: no
  tasks:
    - git:
        repo=https://github.com/tagomoris/xbuild.git
        dest=/home/isucon/.xbuild
        update=yes
    # python
    # datasource=python-version depName=python
    - command: /home/isucon/.xbuild/python-install 3.14.3 /home/isucon/.local/python
      args:
        creates: /home/isucon/.local/python/bin/python
      tags:
        - python3
