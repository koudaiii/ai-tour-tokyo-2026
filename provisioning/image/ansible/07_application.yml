- hosts: guests:extras
  become: yes
  become_user: isucon
  gather_facts: no
  tasks:
    - name: Create Python virtualenv
      shell: /home/isucon/.local/python/bin/python3 -m venv .venv
      args:
        chdir: /home/isucon/private_isu
        creates: /home/isucon/private_isu/.venv/bin/activate
      tags:
        - python3

    - name: Bootstrap pip in the virtualenv
      shell: .venv/bin/python -m ensurepip --upgrade
      args:
        chdir: /home/isucon/private_isu
        creates: /home/isucon/private_isu/.venv/bin/pip
      tags:
        - python3

    - name: Install UV CLI into virtualenv
      pip:
        virtualenv: /home/isucon/private_isu/.venv
        name:
          - uv
      tags:
        - python3

    - name: Bootstrap app dependencies via script/bootstrap
      shell: PATH=/home/isucon/private_isu/.venv/bin:$PATH /home/isucon/private_isu/script/bootstrap
      args:
        chdir: /home/isucon/private_isu
      tags:
        - python3

- hosts: guests:extras
  become: yes
  gather_facts: yes
  tasks:
    - copy: src=../files/home/isucon/env.sh dest=/home/isucon/env.sh owner=isucon mode=644
    - name: python app (systemd)
      copy:
        src: ../files/etc/systemd/system/isu-python.service
        dest: /etc/systemd/system/isu-python.service
        owner: root
        mode: 0644
      tags:
        - python3
    - name: reload daemon config
      shell: systemctl daemon-reload
    - name: default application selection
      service: name=isu-python state=started enabled=true
