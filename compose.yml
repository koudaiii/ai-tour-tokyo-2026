name: private-isu
services:
  nginx:
    image: nginx:1.28
    depends_on:
      - app
    volumes:
      - ./etc/nginx/conf.d:/etc/nginx/conf.d
      - ./public:/public
    ports:
      - "80:80"
    networks:
      - my_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      memcached:
        condition: service_started
    environment:
      ISUCONP_DATABASE_URL: postgresql://isuconp:isuconp@postgres:5432/isuconp
      ISUCONP_MEMCACHED_ADDRESS: memcached:11211
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-images}
    networks:
      - my_network
    volumes:
      - ./public:/home/public
    init: true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1g

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: isuconp
      POSTGRES_PASSWORD: isuconp
      POSTGRES_DB: isuconp
    volumes:
      - postgres:/var/lib/postgresql/data
      - sql/bootstrap_create_database.sql:/docker-entrypoint-initdb.d/bootstrap_create_database.sql:ro
      - sql/bootstrap_create_tables.sql:/docker-entrypoint-initdb.d/bootstrap_create_tables.sql:ro
      - sql/bootstrap_fix_sequences.sql:/docker-entrypoint-initdb.d/bootstrap_fix_sequences.sql:ro
      - sql/bootstrap_grant_connect.sql:/docker-entrypoint-initdb.d/bootstrap_grant_connect.sql:ro
      - sql/bootstrap_grant_local_privileges.sql:/docker-entrypoint-initdb.d/bootstrap_grant_local_privileges.sql:ro
    ports:
      - "5432:5432"
    networks:
      - my_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isuconp"]
      interval: 5s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1g

  memcached:
    image: memcached:1.6
    networks:
      - my_network

volumes:
  postgres:

networks:
  my_network:
