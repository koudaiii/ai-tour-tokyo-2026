---
- hosts: guests:extras
  become: yes
  become_user: isucon
  gather_facts: no
  vars:
    app_dir: "/home/isucon/private_isu"
    repo_url: "https://github.com/koudaiii/ai-tour-tokyo-2026.git"
  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: isucon
        group: isucon
        mode: '0755'
    - name: Clone repository to application directory
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        depth: 1
        force: yes # force checkout to ensure clean state if tmp_dir somehow exists
